<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebhookEngine Console</title>
    
    <script>
        const p = window.location.pathname;
        if (!localStorage.getItem('webhook_token') && !['/login','/register','/forgot-password','/'].includes(p)) {
            window.location.replace('/login');
        }
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/assets/css/style.css?v=30">
    <style>
        [v-cloak] { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen overflow-hidden bg-gray-50 text-slate-800">

    <div id="app" class="w-full h-full" v-cloak>

        <div v-if="!token" class="h-full flex flex-col md:flex-row shadow-2xl overflow-hidden">
            <div class="w-full h-full flex items-center justify-center bg-white">
                 <div class="text-center">
                     <h2 class="text-2xl font-bold mb-4 text-slate-700">טוען מערכת...</h2>
                     <button @click="performLogout" class="text-blue-600 underline text-sm">נתקע? לחץ כאן</button>
                 </div>
            </div>
        </div>

        <div v-else class="flex w-full h-full relative">
            
            <aside :class="mobileMenuOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'" class="fixed md:static inset-y-0 right-0 w-72 bg-white border-l border-slate-200 flex flex-col z-50 transition-transform duration-300 ease-in-out">
                <div class="h-20 flex items-center px-8 border-b border-slate-50">
                    <h1 class="text-xl font-bold tracking-tight text-slate-800">Webhook<span class="text-indigo-600">Engine</span></h1>
                    <button @click="mobileMenuOpen = false" class="mr-auto md:hidden text-slate-400 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                
                <nav class="flex-1 py-8 px-4 space-y-1 overflow-y-auto">
                    <p class="px-4 text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">תפריט ראשי</p>
                    
                    <a href="#" @click.prevent="navigate('/dashboard')" :class="{'active': isRoute('dashboard')}" class="nav-link flex items-center px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition group font-medium text-sm mb-1">
                        <i class="fa-solid fa-house w-5 ml-3 opacity-70 group-hover:opacity-100 transition"></i> דף הבית
                    </a>
                    
                    <a href="#" @click.prevent="navigate('/sources')" :class="{'active': isRoute('sources') || isRoute('source-details')}" class="nav-link flex items-center px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition group font-medium text-sm mb-1">
                        <i class="fa-solid fa-satellite-dish w-5 ml-3 opacity-70 group-hover:opacity-100 transition"></i> מקורות
                    </a>
                    
                    <a href="#" @click.prevent="navigate('/destinations')" :class="{'active': isRoute('destinations') || isRoute('dest-details') || isRoute('filter-editor')}" class="nav-link flex items-center px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition group font-medium text-sm mb-1">
                        <i class="fa-solid fa-share-nodes w-5 ml-3 opacity-70 group-hover:opacity-100 transition"></i> יעדים
                    </a>
                
                    <a href="#" @click.prevent="navigate('/events')" :class="{'active': isRoute('events') || isRoute('event-details')}" class="nav-link flex items-center px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition group font-medium text-sm mb-1">
                        <i class="fa-solid fa-clock-rotate-left w-5 ml-3 opacity-70 group-hover:opacity-100 transition"></i> אירועים ולוגים
                    </a>

                    <a v-if="user.role === 'ADMIN'" href="#" @click.prevent="navigate('/admin')" :class="{'active': isRoute('admin')}" class="nav-link flex items-center px-4 py-3 rounded-lg text-red-600 bg-red-50/50 hover:bg-red-50 transition group font-medium text-sm mb-1 mt-6 border border-red-100">
                        <i class="fa-solid fa-user-shield w-5 ml-3 opacity-70 group-hover:opacity-100 transition"></i> ניהול מערכת
                    </a>

                    <a href="#" @click.prevent="navigate('/settings')" :class="{'active': isRoute('settings')}" class="nav-link flex items-center px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-50 transition group font-medium text-sm mb-1 mt-6 border-t border-slate-100">
                        <i class="fa-solid fa-gear w-5 ml-3 opacity-70 group-hover:opacity-100 transition"></i> הגדרות ו-API
                    </a>
                    
                    <a href="#" @click.prevent="navigate('/pricing')" :class="{'active': isRoute('pricing')}" class="nav-link flex items-center px-4 py-3 rounded-lg text-indigo-600 hover:bg-indigo-50 transition group font-medium text-sm mb-1 mt-4">
                        <i class="fa-solid fa-crown w-5 ml-3 opacity-70 group-hover:opacity-100 transition"></i> חבילות ומחירים
                    </a>

                </nav>
                
                <div class="p-4 border-t border-slate-100 bg-slate-50 relative">
                    <div v-if="showUserMenu" class="absolute bottom-full left-0 w-full mb-2 px-2 z-50 animate-fade-in-up">
                        <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">
                            <a href="#" @click.prevent="confirmLogout" class="block px-4 py-3 text-sm text-red-600 hover:bg-red-50 font-medium">
                                <i class="fa-solid fa-right-from-bracket ml-2"></i> התנתק
                            </a>
                        </div>
                    </div>
                    <div @click="showUserMenu = !showUserMenu" class="flex items-center gap-3 cursor-pointer hover:bg-white p-2 rounded-lg transition select-none">
                        <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-sm shadow-sm">{{ userInitials }}</div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-slate-700 truncate">{{ user.name }}</p>
                            <p class="text-xs text-slate-500 truncate">{{ user.email }}</p>
                        </div>
                        <i class="fa-solid fa-chevron-up text-xs text-slate-400"></i>
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#f8fafc]">
                <header class="h-20 flex items-center justify-between px-8 bg-white border-b border-slate-200 sticky top-0 z-30 shrink-0">
                    <div class="flex items-center gap-4">
                        <button @click="mobileMenuOpen = true" class="md:hidden text-slate-500 hover:text-indigo-600 p-1"><i class="fa-solid fa-bars text-xl"></i></button>
                        <h2 class="text-xl font-bold text-slate-800">{{ pageTitle }}</h2>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200" title="ניצול חבילה חודשי">
                            <i class="fa-solid fa-chart-pie text-indigo-500 ml-1"></i>
                            <span class="text-indigo-700 font-bold">{{ user.usageCount }}</span> / {{ user.monthlyLimit }}
                        </div>
                        <button @click="fetchData" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border hover:bg-slate-50 text-slate-500 transition shadow-sm" title="רענן נתונים">
                            <i class="fa-solid fa-rotate-right" :class="{'fa-spin': loading}"></i>
                        </button>
                    </div>
                </header>
                
                <div class="flex-1 overflow-y-auto p-4 md:p-8 relative">
                    
                    <component 
                        :is="currentView" 
                        :user="user" 
                        :sources="sources" 
                        :destinations="destinations" 
                        :events="events"
                        
                        :current-source="currentSource"
                        :current-dest="currentDest"
                        :current-event="currentEvent"
                        
                        @navigate="navigate"
                        @create-source="handleCreateSource"
                        @delete-source="handleDeleteSource"
                        @update-source="handleUpdateSource"
                        @create-dest="handleCreateDest"
                        @update-dest="handleUpdateDest"
                        @delete-dest="handleDeleteDest"
                        @update-sources="sources = $event">
                    </component>
                    
                    <div v-if="!currentView" class="flex flex-col items-center justify-center py-40 text-slate-400 h-full">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4 text-indigo-500"></i>
                        <p class="animate-pulse">טוען נתונים...</p>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="/assets/js/views/dashboard.js?v=130"></script>
    <script src="/assets/js/views/pricing.js?v=2"></script>
    <script src="/assets/js/views/sources.js?v=130"></script>
    <script src="/assets/js/views/admin.js?v=130"></script>
    <script src="/assets/js/views/destinations.js?v=130"></script>
    <script src="/assets/js/views/source-details.js?v=130"></script>
    <script src="/assets/js/views/destination-details.js?v=130"></script>
    <script src="/assets/js/views/filter-editor.js?v=130"></script>
    <script src="/assets/js/views/events.js?v=130"></script>
    <script src="/assets/js/views/connections.js?v=130"></script>
    <script src="/assets/js/views/settings.js?v=130"></script>
    
    <script src="/assets/js/app.js?v=130"></script>
</body>
</html>
