version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: webhook-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - webhook-network

  # Queue
  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - ./redis-data:/data
    networks:
      - webhook-network

  # UI for DB
  adminer:
    image: adminer
    container_name: webhook-db-ui
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - postgres
    networks:
      - webhook-network

  # --- The Application (Immutable) ---
  webhook-backend:
    # שינוי קריטי: שימוש באימג' המוכן במקום בנייה
    image: webhook-engine-webhook-backend:latest
    container_name: webhook-backend
    restart: always
    ports:
      - "3005:3000"
      - "25:2525"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_USER: no-reply@botomat.co.il
      JWT_SECRET: supersecretkey
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - webhook-network

networks:
  webhook-network:
    driver: bridge
