<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איפוס סיסמה | WebhookEngine</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap'); body { font-family: 'Heebo', sans-serif; }</style>
</head>
<body class="bg-gray-50 h-screen w-full overflow-hidden">
    <div id="app" class="h-full flex flex-col md:flex-row shadow-2xl overflow-hidden" v-cloak>
        
        <div class="w-full md:w-1/2 lg:w-5/12 bg-white h-full flex items-center justify-center p-8 md:p-12 relative z-10">
            <div class="w-full max-w-md text-center">
                
                <div class="mb-10 text-center md:text-right">
                    <div class="flex items-center justify-center md:justify-start gap-3 text-indigo-600 mb-2">
                        <i class="fa-solid fa-bolt text-3xl"></i>
                        <span class="text-3xl font-black tracking-tight">WebhookEngine</span>
                    </div>
                </div>

                <div v-if="checkingToken" class="text-center py-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i>
                    <p class="text-gray-500">מאמת קישור...</p>
                </div>

                <div v-else-if="tokenError" class="text-center">
                    <div class="bg-red-50 text-red-600 p-6 rounded-xl border border-red-100 mb-6">
                        <i class="fa-solid fa-circle-xmark text-5xl mb-4"></i>
                        <h3 class="text-xl font-bold mb-2">הקישור אינו תקין</h3>
                        <p class="text-sm opacity-80">הקישור שומש כבר או שפג תוקפו (עברה שעה).</p>
                    </div>
                    <a href="/" class="inline-block bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-gray-900 transition font-bold">
                        חזרה למסך כניסה
                    </a>
                </div>

                <div v-else-if="!success">
                    <div class="mb-8 text-center md:text-right">
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">הגדרת סיסמה חדשה</h2>
                        <p class="text-gray-500 text-sm">אנא בחר סיסמה חדשה וחזקה לחשבון שלך.</p>
                    </div>

                    <form @submit.prevent="resetPassword">
                        <div class="space-y-5 text-right">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">סיסמה חדשה</label>
                                <div class="relative">
                                    <input v-model="password" :type="showPass1 ? 'text' : 'password'" class="w-full pr-4 pl-10 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                                    <button type="button" @click="showPass1 = !showPass1" class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 hover:text-gray-600">
                                        <i :class="showPass1 ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">אימות סיסמה</label>
                                <div class="relative">
                                    <input v-model="confirmPassword" :type="showPass2 ? 'text' : 'password'" class="w-full pr-4 pl-10 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                                    <button type="button" @click="showPass2 = !showPass2" class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 hover:text-gray-600">
                                        <i :class="showPass2 ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" :disabled="loading" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5 disabled:opacity-50">
                                <span v-if="loading"><i class="fa-solid fa-circle-notch fa-spin ml-2"></i> מעדכן...</span>
                                <span v-else>עדכן סיסמה והתחבר</span>
                            </button>
                        </div>
                    </form>
                    <p v-if="formError" class="text-red-500 mt-4 text-center text-sm font-bold bg-red-50 p-2 rounded">{{ formError }}</p>
                </div>

                <div v-else class="text-center">
                    <div class="mb-4 text-green-500 text-6xl animate-bounce">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-800 mb-2">הסיסמה שונתה בהצלחה!</h3>
                    <p class="text-gray-600 mb-6">מיד תועבר לדף ההתחברות...</p>
                </div>

            </div>
        </div>

        <div class="hidden md:flex w-1/2 lg:w-7/12 bg-gray-900 relative items-center justify-center p-12 text-white">
             <div class="absolute inset-0 bg-indigo-900 opacity-50"></div>
             <div class="relative z-10 text-center">
                <i class="fa-solid fa-shield-halved text-6xl mb-6 text-indigo-400"></i>
                <h1 class="text-4xl font-extrabold mb-4">אבטחה ללא פשרות</h1>
             </div>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    password: '',
                    confirmPassword: '',
                    loading: false,
                    checkingToken: true,
                    tokenError: false,
                    formError: '',
                    success: false,
                    token: '',
                    showPass1: false,
                    showPass2: false
                }
            },
            async mounted() {
                const urlParams = new URLSearchParams(window.location.search);
                this.token = urlParams.get('token');
                
                if (!this.token) {
                    this.tokenError = true;
                    this.checkingToken = false;
                    return;
                }

                try {
                    const res = await fetch(`/auth/validate-reset-token/${this.token}`);
                    const data = await res.json();
                    
                    if (!data.valid) {
                        this.tokenError = true;
                    }
                } catch (e) {
                    this.tokenError = true;
                } finally {
                    this.checkingToken = false;
                }
            },
            methods: {
                async resetPassword() {
                    if (this.password !== this.confirmPassword) {
                        this.formError = 'הסיסמאות אינן תואמות';
                        return;
                    }
                    if (this.password.length < 6) {
                        this.formError = 'הסיסמה חייבת להכיל לפחות 6 תווים';
                        return;
                    }

                    this.loading = true;
                    this.formError = '';
                    
                    try {
                        const res = await fetch('/auth/reset-password', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ token: this.token, password: this.password })
                        });
                        
                        if (!res.ok) throw new Error('שגיאה באיפוס');
                        
                        this.success = true;
                        
                        // תיקון: הפניה ל-/ (דף הכניסה הנקי)
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 3000);

                    } catch (e) {
                        this.formError = 'אירעה שגיאה. ייתכן שהקישור פג תוקף.';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
